name: Docs 

env:
  USE_LOCKFILE: ${{ secrets.USE_LOCKFILE }}
  ENABLE_DOCS: ${{ secrets.ENABLE_DOCS }}

on:
  push:
    branches: [ master ]
  repository_dispatch:
    types: [ docs ]

jobs:
  docs:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['24.15.0']
        # node-version: ["lts/*"]
    steps:
    - uses: actions/checkout@v6
      if: "env.ENABLE_DOCS == 'true'"

    - name: Setup
      uses: ./.github/actions/composite-setup
      if: "env.ENABLE_DOCS == 'true'"
      timeout-minutes: 15
      with:
        USE_LOCKFILE: ${{ env.USE_LOCKFILE }}

    - name: Build 
      uses: ./.github/actions/composite-build
      if: "env.ENABLE_DOCS == 'true'"
      with:
        USE_LOCKFILE: ${{ env.USE_LOCKFILE }}
        test_script: "echo 'skipping tests'"

    - run: pnpm doc
      if: "env.ENABLE_DOCS == 'true'"

    - name: Documentation
      uses: crazy-max/ghaction-github-pages@v4
      if: "env.ENABLE_DOCS == 'true'"
      with:
        jekyll: false
        target_branch: gh-pages
        build_dir: docs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Keep the runner alive for 10 minutes on failure so it can be SSH'd into
    # for debugging via the Blacksmith dashboard.
    - name: Hold runner open on failure for debugging
      if: failure()
      timeout-minutes: 11
      run: |
        echo "Job failed. Holding runner open for 10 minutes for SSH debugging."
        echo "See https://docs.blacksmith.sh/blacksmith-runners/ssh-into-runners for SSH instructions."
        sleep 600
