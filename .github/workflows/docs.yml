name: Docs

on:
  push:
    branches: [ master ]
  repository_dispatch:
    types: [ docs ]

jobs:
  docs:
    if: "vars.ENABLE_DOCS == 'true'"
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['24.15.0']
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        timeout-minutes: 15
        uses: alanscodelog/actions/.github/actions/setup@master
        with:
          USE_LOCKFILE: ${{ vars.USE_LOCKFILE }}
          INSTALL_PLAYWRIGHT: true

      - name: Build
        uses: alanscodelog/actions/.github/actions/build@master
        with:
          test_script: "echo 'skipping tests'"

      - name: Deploy Docs
        uses: alanscodelog/actions/.github/actions/docs@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hold runner open on failure for debugging
        if: failure()
        timeout-minutes: 11
        run: |
          echo "Job failed. Holding runner open for 10 minutes for SSH debugging."
          echo "See https://docs.blacksmith.sh/blacksmith-runners/ssh-into-runners for SSH instructions."
          sleep 600